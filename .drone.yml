kind: pipeline
name: default



steps:
  - name: submodules
    image: alpine/git
    commands:
      - git submodule update --init --recursive

  - name: build
    image: ubuntu:24.04
    commands:
      - apt-get update && apt-get install -y wget git
      # Download the exact Extended version for Linux
      - wget https://github.com/gohugoio/hugo/releases/download/v0.157.0/hugo_extended_0.157.0_linux-amd64.deb
      - dpkg -i hugo_extended_0.157.0_linux-amd64.deb
      # Verify and Build
      - hugo version
      - hugo --minify

  - name: rsync
    image: drillster/drone-rsync
    settings:
      user: philip
      key:
        from_secret: rsync_key
      hosts:
        - docker.rosenberg-watt.com
      source: ./public/
      target: /opt/ipfs/export/blog/
      delete: true
